<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DOM Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id="title">Заголовок</h1>

    <p class="text">Абзац 1</p>
    <p class="text">Абзац 2</p>
    <p class="text">Абзац 3</p>

    <button id="changeTextBtn">Изменить текст</button>
    <button id="colorBtn">Покрасить</button>

    <img id="img" src="https://via.placeholder.com/150" alt="img">
    <br><br>
    <a id="link" href="https://google.com">Google</a>
    <br><br>

    <div id="content"></div>

    <hr>

    <div id="message">Привет</div>
    <button id="themeBtn">Сменить тему</button>

    <hr>

    <h2 id="counter">0</h2>
    <button id="plus">+</button>
    <button id="minus">-</button>

    <hr>

    <input type="password" id="password">
    <button id="togglePassword">Показать</button>

    <hr>

    <div id="hoverBox">Наведи на меня</div>
    <button id="alertBtn">Кликни</button>

    <hr>

    <input type="text" id="liveInput">
    <p id="liveText"></p>

    <hr>

    <input type="text" id="nameInput">
    <button id="sendBtn">Отправить</button>
    <p id="result"></p>

    <script src="app.js"></script>
</body>
</html>
