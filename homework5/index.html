<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Магазин</h1>

    <div class="controls">
        <button id="loadBtn">Загрузить товары</button>
        <input type="text" id="searchInput" placeholder="Поиск товаров">
    </div>
    <div id="status"></div>
    <div id="products" class="products"></div>

    <h2>Корзина</h2>
    <div id="cart"></div>

    <hr>

    <h1>Pokemon Finder</h1>

    <div class="controls">
        <input type="text" id="pokemonInput" placeholder="pikachu">
        <button id="pokemonBtn">Найти</button>
    </div>

    <div id="pokemonResult"></div>

    <script src="app.js"></script>
</body>
</html>
