<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Список задач</h1>

        <div class="input-group">
            <input type="text" id="textInput" placeholder="Введите задачу">
            <button id="addTaskBtn">Добавить</button>
        </div>

        <ul id="taskList">
            <li class="task_item">
                Купить хлеб
                <button class="delete-btn">Удалить</button>
            </li>
            <li class="task_item">
                Сделать ДЗ
                <button class="delete-btn">Удалить</button>
            </li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
